server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: speak-score-app

  datasource:
    url: jdbc:mysql://localhost:3306/speak_score?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

jwt:
  secret: ${JWT_SECRET:SpeakScoreApp2024SecretKeyForJwtTokenGenerationMustBeLongEnough}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

wechat:
  mini-app:
    app-id: ${WECHAT_MINI_APP_ID:}
    app-secret: ${WECHAT_MINI_APP_SECRET:}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session?appid=%s&secret=%s&js_code=%s&grant_type=authorization_code

sms:
  provider: ${SMS_PROVIDER:mock}
  access-key: ${SMS_ACCESS_KEY:}
  access-secret: ${SMS_ACCESS_SECRET:}
  sign-name: ${SMS_SIGN_NAME:}
  template-code: ${SMS_TEMPLATE_CODE:}

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:speak-score}
  custom-domain: ${OSS_CUSTOM_DOMAIN:}

vod:
  region-id: ${VOD_REGION_ID:cn-hangzhou}
  access-key-id: ${VOD_ACCESS_KEY_ID:}
  access-key-secret: ${VOD_ACCESS_KEY_SECRET:}
  template-group-id: ${VOD_TEMPLATE_GROUP_ID:}
  storage-location: ${VOD_STORAGE_LOCATION:}

content-review:
  enabled: ${CONTENT_REVIEW_ENABLED:false}
  provider: ${CONTENT_REVIEW_PROVIDER:aliyun}
  access-key-id: ${CONTENT_REVIEW_ACCESS_KEY_ID:}
  access-key-secret: ${CONTENT_REVIEW_ACCESS_KEY_SECRET:}
  endpoint: ${CONTENT_REVIEW_ENDPOINT:}

notification:
  email:
    enabled: ${NOTIFY_EMAIL_ENABLED:false}
    host: ${NOTIFY_EMAIL_HOST:smtp.example.com}
    port: ${NOTIFY_EMAIL_PORT:465}
    username: ${NOTIFY_EMAIL_USERNAME:}
    password: ${NOTIFY_EMAIL_PASSWORD:}
    from: ${NOTIFY_EMAIL_FROM:noreply@example.com}
    ssl: true
  dingtalk:
    enabled: ${NOTIFY_DINGTALK_ENABLED:false}
    webhook: ${NOTIFY_DINGTALK_WEBHOOK:}
    secret: ${NOTIFY_DINGTALK_SECRET:}
  wechat:
    enabled: ${NOTIFY_WECHAT_ENABLED:false}
    template-id: ${NOTIFY_WECHAT_TEMPLATE_ID:}
  reminder:
    cron: ${NOTIFY_REMINDER_CRON:0 */5 * * * *}
    advance-minutes: ${NOTIFY_ADVANCE_MINUTES:30}

logging:
  level:
    com.speak.score: DEBUG
    org.springframework.security: DEBUG
