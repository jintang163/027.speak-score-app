server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: speak-score-app

  datasource:
    url: jdbc:mysql://localhost:3306/speak_score?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  security:
    oauth2:
      client:
        registration:
          wechat:
            client-id: ${WECHAT_APP_ID:}
            client-secret: ${WECHAT_APP_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - snsapi_userinfo
        provider:
          wechat:
            authorization-uri: https://open.weixin.qq.com/connect/oauth2/authorize
            token-uri: https://api.weixin.qq.com/sns/oauth2/access_token
            user-info-uri: https://api.weixin.qq.com/sns/userinfo
            user-name-attribute: openid

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:SpeakScoreApp2024SecretKeyForJwtTokenGenerationMustBeLongEnough}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

wechat:
  mini-app:
    app-id: ${WECHAT_MINI_APP_ID:}
    app-secret: ${WECHAT_MINI_APP_SECRET:}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session?appid=%s&secret=%s&js_code=%s&grant_type=authorization_code

sms:
  provider: ${SMS_PROVIDER:mock}
  access-key: ${SMS_ACCESS_KEY:}
  access-secret: ${SMS_ACCESS_SECRET:}
  sign-name: ${SMS_SIGN_NAME:}
  template-code: ${SMS_TEMPLATE_CODE:}

logging:
  level:
    com.speak.score: DEBUG
    org.springframework.security: DEBUG
